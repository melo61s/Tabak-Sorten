<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Shisha Bar</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(180deg, #000, #111);
    color: white;
}

header {
    text-align: center;
    padding: 25px;
    font-size: 26px;
    color: gold;
    border-bottom: 1px solid #333;
}

.container {
    padding: 15px;
}

.card {
    background: #1a1a1a;
    margin: 10px 0;
    padding: 15px;
    border-radius: 15px;
    text-align: center;
    font-size: 18px;
    border: 1px solid #333;
}
</style>
</head>

<body>

<header>🔥 Mobile Shisha Bar 🔥</header>

<div class="container" id="list"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB1-q3xacqIZ2vEMtNBPk8J-sNHdLReiyI",
  authDomain: "golden61-aa573.firebaseapp.com",
  projectId: "golden61-aa573",
  storageBucket: "golden61-aa573.firebasestorage.app",
  messagingSenderId: "518919160732",
  appId: "1:518919160732:web:41db365c320d6fb0587e59",
  measurementId: "G-353V59ENVK"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔥 LIVE DATEN LADEN
const list = document.getElementById("list");

onSnapshot(collection(db, "tabak"), (snapshot) => {
    list.innerHTML = "";

    snapshot.forEach((doc) => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = doc.data().name;
        list.appendChild(div);
    });
});
</script>

</body>
</html>

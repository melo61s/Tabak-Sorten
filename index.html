<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Shisha Bar</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(180deg, #000, #111);
    color: white;
}

header {
    text-align: center;
    padding: 25px;
    font-size: 26px;
    color: gold;
}

.card {
    background: #1a1a1a;
    margin: 10px;
    padding: 15px;
    border-radius: 15px;
    text-align: center;
    font-size: 18px;
    border: 1px solid #333;
}

.out {
    opacity: 0.4;
    text-decoration: line-through;
}

.badge {
    color: red;
    font-size: 12px;
}
</style>
</head>

<body>

<header>🔥 Mobile Shisha Bar 🔥</header>

<div id="list"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB1-q3xacqIZ2vEMtNBPk8J-sNHdLReiyI",
  authDomain: "golden61-aa573.firebaseapp.com",
  projectId: "golden61-aa573",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const list = document.getElementById("list");

onSnapshot(collection(db, "tabak"), (snapshot) => {
    list.innerHTML = "";

    snapshot.forEach((docItem) => {
        const data = docItem.data();

        const div = document.createElement("div");
        div.className = "card";

        if(data.status === "ausverkauft"){
            div.classList.add("out");
            div.innerHTML = `${data.name} <div class="badge">AUSVERKAUFT</div>`;
        } else {
            div.innerHTML = `💨 ${data.name}`;
        }

        list.appendChild(div);
    });
});
</script>

</body>
</html>

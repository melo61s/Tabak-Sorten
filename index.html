<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Shisha Bar</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg, #000, #111);
    color: white;
}

header {
    text-align: center;
    padding: 25px;
    font-size: 26px;
    font-weight: bold;
    color: gold;
    border-bottom: 1px solid #333;
}

.sub {
    text-align: center;
    color: #aaa;
    font-size: 14px;
}

.container {
    padding: 15px;
}

.category {
    margin-top: 20px;
    color: gold;
    font-size: 18px;
}

.card {
    background: #1a1a1a;
    margin: 10px 0;
    padding: 15px;
    border-radius: 15px;
    text-align: center;
    font-size: 18px;
    border: 1px solid #333;
    box-shadow: 0 0 10px rgba(255,215,0,0.2);
}

.badge {
    color: #0f0;
    font-size: 12px;
}

.footer {
    text-align: center;
    margin-top: 20px;
    color: #666;
    font-size: 12px;
}
</style>
</head>

<body>

<header>🔥 Mobile Shisha Bar 🔥</header>
<div class="sub">Heutige Tabaksorten</div>

<div class="container">

<div class="category">🍓 Fruchtig</div>
<div class="card">Erdbeere Minze <div class="badge">Beliebt</div></div>
<div class="card">Wassermelone Chill</div>

<div class="category">❄️ Ice</div>
<div class="card">Traube Ice</div>
<div class="card">Zitrone Fresh</div>

<div class="category">💎 Premium</div>
<div class="card">Love 66</div>
<div class="card">Black Nana</div>

</div>

<div class="footer">
Stand: Heute
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin</title>
</head>

<body>

<h1>Admin Panel</h1>

<input id="name" placeholder="Tabak eingeben">
<button onclick="addTabak()">Hinzufügen</button>

<div id="list"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB1-q3xacqIZ2vEMtNBPk8J-sNHdLReiyI",
  authDomain: "golden61-aa573.firebaseapp.com",
  projectId: "golden61-aa573",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const list = document.getElementById("list");

// ➕ hinzufügen
window.addTabak = async function(){
    const name = document.getElementById("name").value;

    await addDoc(collection(db, "tabak"), {
        name: name,
        status: "verfügbar"
    });
}

// 🔄 live anzeigen + admin funktionen
onSnapshot(collection(db, "tabak"), (snapshot) => {
    list.innerHTML = "";

    snapshot.forEach((docItem) => {
        const data = docItem.data();

        const div = document.createElement("div");
        div.innerHTML = `
        <p>${data.name} (${data.status})</p>
        <button onclick="deleteItem('${docItem.id}')">❌ Löschen</button>
        <button onclick="toggle('${docItem.id}', '${data.status}')">⚠️ Status ändern</button>
        `;
        list.appendChild(div);
    });
});

// ❌ löschen
window.deleteItem = async function(id){
    await deleteDoc(doc(db, "tabak", id));
}

// ⚠️ status ändern
window.toggle = async function(id, current){
    const newStatus = current === "verfügbar" ? "ausverkauft" : "verfügbar";

    await updateDoc(doc(db, "tabak", id), {
        status: newStatus
    });
}
</script>

</body>
</html>
